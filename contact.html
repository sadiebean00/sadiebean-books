<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact | Sadie Sundt</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar"></div>

<div class="container py-5">
<h1 class="text-center mb-4">Contact Me</h1>
<form>
  <div class="mb-3">
    <label>Name</label>
    <input type="text" class="form-control" placeholder="Your Name">
  </div>
  <div class="mb-3">
    <label>Email</label>
    <input type="email" class="form-control" placeholder="Your Email">
  </div>
  <div class="mb-3">
    <label>Message</label>
    <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
  </div>
  <button class="btn btn-dark">Send Message</button>
</form>

<section class="newsletter py-5 text-center">
  <h3>Subscribe to My Newsletter</h3>
  <p>Get updates on new books and exclusive content!</p>
  <form action="https://sadiebean.us12.list-manage.com/subscribe/post?u=9e43206801f8fa7b6cc767e30&amp;id=d78cae3666&amp;f_id=004b12e1f0" method="POST" target="_blank">
    <input type="email" name="EMAIL" class="form-control d-inline" placeholder="Enter your email" required>
    <button class="btn btn-dark" type="submit">Subscribe</button>
  </form>
</section>

<script src="/js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
